<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Buff抽选系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Microsoft YaHei", sans-serif; }
        html, body { width: 100%; height: 100%; min-height: 100vh; }
        body {
            background-image: url("./galatea.jpg");
            background-repeat: no-repeat;
            background-position: center;
            background-size: cover;
            background-attachment: fixed;
            background-color: #222;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
            padding-bottom: 180px;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.35);
            z-index: -1;
        }
        .title { text-align: center; color: white; margin-bottom: 30px; font-size: 28px; text-shadow: 0 0 10px rgba(0,0,0,0.5); }
        .bond-global-tip{ text-align:center; color:#fff; font-size:16px; margin-bottom:15px; text-shadow:0 0 6px #000; }
        .category-box { display: flex; justify-content: center; flex-wrap: wrap; gap: 15px; margin-bottom: 25px; }
        .category-btn { padding: 12px 20px; font-size: 16px; border: none; border-radius: 8px; cursor: pointer; background: rgba(255,255,255,0.85); }
        .category-btn.active { background-color: #409eff; color: white; }
        .control-box { text-align: center; margin-bottom: 30px; }
        .main-btn { padding: 15px 25px; font-size: 16px; border: none; border-radius: 8px; background: rgba(103, 194, 58, 0.9); color: white; cursor: pointer; margin: 5px; }
        .main-btn:disabled { background: #999; cursor: not-allowed; }
        .next-round-btn { background: #409eff; }
        .pool-box { display: none !important; }
        .selected-box { background: rgba(255,255,255,0.9); padding: 20px; border-radius: 10px; margin-top:20px; }
        .pool-title { font-size: 20px; color: #333; margin-bottom: 15px; font-weight: bold; }
        .selected-item { display: flex; align-items: center; justify-content: space-between; padding: 12px 15px; background: #f0f8ff; margin-bottom: 10px; border-radius: 6px; }
        .selected-item.chosen { background: #e6f7ff; border: 2px solid #409eff; }
        .replace-btn { padding: 6px 12px; background: #ff9800; color: white; border: none; border-radius: 4px; cursor: pointer; }
        .replace-btn:disabled { background: #aaa; cursor: not-allowed; }
        .choose-btn { padding: 6px 12px; background: #2ecc71; color: white; border: none; border-radius: 4px; cursor: pointer; }
        .choose-btn.active { background: #2196f3; }
        .tip { color: white; margin-top:10px; text-align:center; }
        .stacked-buffs{ position: fixed; left:0; bottom:0; width:100%; background:rgba(0,0,0,0.85); padding:15px; color:white; z-index:99; }
        .stacked-buff-tag { display: inline-block; background: #409eff; color: white; padding: 4px 8px; border-radius: 4px; margin: 3px 5px; cursor: pointer; }
        .name-text { cursor: pointer; color: #409eff; font-weight: bold; }
        .modal-overlay { position: fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.7); display:none; align-items:center; justify-content:center; z-index:1000; }
        .modal-content { background:white; padding:25px; border-radius:12px; width:90%; max-width:500px; }
        .modal-close-btn { padding:10px 25px; background:#409eff; color:white; border:none; border-radius:6px; cursor:pointer; margin-top:15px; }
    </style>
</head>
<body>
    <h1 class="title">Buff抽选系统</h1>
    <div class="bond-global-tip" id="globalBondTip">加载配置中...</div>

    <div class="category-box">
        <button class="category-btn active" data-type="棱彩阶">棱彩阶</button>
        <button class="category-btn" data-type="黄金阶">黄金阶</button>
        <button class="category-btn" data-type="白银阶">白银阶</button>
    </div>

    <div class="control-box">
        <button class="main-btn" id="startBtn" disabled>开始本轮抽选</button>
        <button class="main-btn next-round-btn" id="nextRoundBtn" disabled>下一轮抽选</button>
        <button class="main-btn" id="resetBtn">重置全部</button>
    </div>

    <div class="pool-box"></div>

    <div class="selected-box">
        <div class="pool-title">本轮3个Buff</div>
        <div id="selectedList"></div>
    </div>

    <div class="tip">点击Buff名称可查看详情；每个Buff可各自替换一次；每轮只能选1个叠加，可随时调换</div>

    <div class="stacked-buffs">
        <div class="stacked-buffs-title">✅ 已叠加Buff（永久累积）</div>
        <div id="stackedBuffsList">暂无Buff</div>
    </div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-content">
            <h2 id="modalTitle"></h2>
            <p id="modalBody"></p>
            <button class="modal-close-btn" id="modalCloseBtn">关闭</button>
        </div>
    </div>

<script>
const bondMap = {
    '~':'超雄','@':'发育','#':'保护伞','%':'偷啃','&':'赛场作法','*':'奶妈','！':'你掉进陷阱了'
};

let buffData = null;
let globalBondSymbol = localStorage.getItem('globalBondSymbol') || null;
let stackedBuffs = JSON.parse(localStorage.getItem('stackedBuffs')) || [];
let currentCategory = "棱彩阶";
let selectedBuffs = [];
let unselectedPool = [];
let replaceCount = [0,0,0];
let chosenIndex = -1;

async function loadConfig(){
    try{
        let res = await fetch(`./config.json?t=${Date.now()}`);
        buffData = await res.json();
        document.getElementById("globalBondTip").innerText = "✅ 配置加载成功";
        document.getElementById("startBtn").disabled = false;
        updateStackedBuffsList();
    }catch(e){
        document.getElementById("globalBondTip").innerText = "⚠️ 配置加载异常";
        document.getElementById("startBtn").disabled = false;
    }
}
loadConfig();

function getBuffDesc(name){
    for(let cat in buffData){
        if(buffData[cat][name]){
            return buffData[cat][name];
        }
    }
    return "暂无效果说明";
}

function updateStackedBuffsList(){
    let el = document.getElementById("stackedBuffsList");
    if(stackedBuffs.length === 0){
        el.innerHTML = "暂无Buff";
        return;
    }
    let html = "";
    stackedBuffs.forEach(name=>{
        html += `<span class="stacked-buff-tag" data-name="${name}">${name}</span>`;
    });
    el.innerHTML = html;
    el.querySelectorAll(".stacked-buff-tag").forEach(tag=>{
        tag.onclick = ()=>{
            let n = tag.dataset.name;
            document.getElementById("modalTitle").innerText = n;
            document.getElementById("modalBody").innerText = getBuffDesc(n);
            document.getElementById("modalOverlay").style.display = "flex";
        };
    });
}

function updateBondTip(){
    if(globalBondSymbol){
        let n = bondMap[globalBondSymbol] || globalBondSymbol;
        document.getElementById("globalBondTip").innerText = `🔒 羁绊锁定：${n}`;
    }else{
        document.getElementById("globalBondTip").innerText = "当前无锁定羁绊";
    }
}

function renderSelectedList(){
    let list = document.getElementById("selectedList");
    list.innerHTML = "";

    selectedBuffs.forEach((buff,idx)=>{
        let item = document.createElement("div");
        item.className = "selected-item";
        if(idx === chosenIndex) item.classList.add("chosen");

        let nameSpan = document.createElement("span");
        nameSpan.className = "name-text";
        nameSpan.innerText = `${idx+1}. ${buff}`;
        nameSpan.onclick = ()=>{
            document.getElementById("modalTitle").innerText = buff;
            document.getElementById("modalBody").innerText = getBuffDesc(buff);
            document.getElementById("modalOverlay").style.display = "flex";
        };

        let btnReplace = document.createElement("button");
        btnReplace.className = "replace-btn";
        btnReplace.innerText = "替换";
        btnReplace.disabled = replaceCount[idx] === 1;
        btnReplace.onclick = ()=>{
            if(unselectedPool.length===0 || replaceCount[idx]===1) return;
            let rnd = Math.floor(Math.random()*unselectedPool.length);
            let newB = unselectedPool[rnd];
            unselectedPool.splice(rnd,1);
            selectedBuffs[idx] = newB;
            replaceCount[idx] = 1;
            renderSelectedList();
        };

        let btnChoose = document.createElement("button");
        btnChoose.className = "choose-btn";
        btnChoose.innerText = "选择叠加";
        btnChoose.onclick = ()=>{
            // 先把上一轮选的取消
            if(chosenIndex !== -1){
                // 从列表里删掉之前的
                let old = selectedBuffs[chosenIndex];
                let i = stackedBuffs.indexOf(old);
                if(i !== -1) stackedBuffs.splice(i,1);
            }

            // 选新的
            chosenIndex = idx;
            let newBuff = selectedBuffs[idx];
            if(!stackedBuffs.includes(newBuff)){
                stackedBuffs.push(newBuff);
            }

            // 羁绊检测
            let syms = ['~','@','#','%','&','*','！'];
            let findSym = syms.find(s=>newBuff.includes(s));
            if(findSym) globalBondSymbol = findSym;

            localStorage.setItem("stackedBuffs",JSON.stringify(stackedBuffs));
            localStorage.setItem("globalBondSymbol",globalBondSymbol||"");

            updateBondTip();
            updateStackedBuffsList();
            document.getElementById("nextRoundBtn").disabled = false;
            renderSelectedList();
        };

        item.appendChild(nameSpan);
        item.appendChild(btnReplace);
        item.appendChild(btnChoose);
        list.appendChild(item);
    });
}

document.getElementById("modalCloseBtn").onclick = ()=>{
    document.getElementById("modalOverlay").style.display = "none";
};

document.getElementById("startBtn").onclick = ()=>{
    if(!buffData) return;
    let all = Object.keys(buffData[currentCategory]);
    all = all.filter(x=>!stackedBuffs.includes(x));
    let shf = [...all].sort(()=>Math.random()-0.5);
    selectedBuffs = shf.slice(0,3);
    unselectedPool = shf.slice(3);
    replaceCount = [0,0,0];
    chosenIndex = -1;
    document.getElementById("nextRoundBtn").disabled = true;
    renderSelectedList();
};

document.getElementById("nextRoundBtn").onclick = ()=>{
    document.getElementById("startBtn").click();
};

document.getElementById("resetBtn").onclick = ()=>{
    localStorage.clear();
    globalBondSymbol = null;
    stackedBuffs = [];
    selectedBuffs = [];
    unselectedPool = [];
    replaceCount = [0,0,0];
    chosenIndex = -1;
    updateBondTip();
    updateStackedBuffsList();
    renderSelectedList();
    document.getElementById("nextRoundBtn").disabled = true;
};

document.querySelectorAll(".category-btn").forEach(btn=>{
    btn.onclick = ()=>{
        document.querySelectorAll(".category-btn").forEach(b=>b.classList.remove("active"));
        btn.classList.add("active");
        currentCategory = btn.dataset.type;
        selectedBuffs = [];
        unselectedPool = [];
        replaceCount = [0,0,0];
        chosenIndex = -1;
        renderSelectedList();
        document.getElementById("nextRoundBtn").disabled = true;
    };
});

updateBondTip();
updateStackedBuffsList();
</script>
</body>
</html>
